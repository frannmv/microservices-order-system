services:
  mcp-server:
    build: ./mcp-server
    ports:
      - "8085:8080"
    depends_on:
      - product-service
      - user-service
      - order-service
      - inventory-service
    networks:
      - microservices-net

  gateway:
    build: ./gateway
    ports:
      - "9090:8080"
    depends_on:
      - product-service
      - user-service
      - order-service
      - inventory-service
    networks:
      - microservices-net

  product-service:
    build: ./product-service
    ports:
      - "8081:8080"
    environment:
      DB_URL: jdbc:mysql://product-db:3306/products
      DB_USER: root
      DB_PASSWORD: password
    depends_on:
      product-db:
        condition: service_healthy
    networks:
      - microservices-net

  user-service:
    build: ./user-service
    ports:
      - "8082:8080"
    environment:
      DB_URL: jdbc:mysql://user-db:3306/users
      DB_USER: root
      DB_PASSWORD: password
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - microservices-net

  order-service:
    build: ./order-service
    ports:
      - "8083:8080"
    environment:
      DB_URL: jdbc:mysql://order-db:3306/orders
      DB_USER: root
      DB_PASSWORD: password
    depends_on:
      order-db:
        condition: service_healthy
    networks:
      - microservices-net

  inventory-service:
    build: ./inventory-service
    ports:
      - "8084:8080"
    environment:
      DB_URL: jdbc:mysql://inventory-db:3306/inventory
      DB_USER: root
      DB_PASSWORD: password
    depends_on:
      inventory-db:
        condition: service_healthy
    networks:
      - microservices-net

  product-db:
    image: mysql:9.6.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: products
    volumes:
      - product-db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  user-db:
    image: mysql:9.6.0
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: users
    volumes:
      - user-db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  order-db:
    image: mysql:9.6.0
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: orders
    volumes:
      - order-db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  inventory-db:
    image: mysql:9.6.0
    ports:
      - "3311:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: inventory
    volumes:
      - inventory-db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge

volumes:
  product-db-data:
  user-db-data:
  order-db-data:
  inventory-db-data: