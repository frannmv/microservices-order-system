spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
              uri: http://product-service:8080
              predicates:
                - Path=/products/**
            - id: user-service
              uri: http://user-service:8080
              predicates:
                - Path=/users/**
            - id: order-service
              uri: http://order-service:8080
              predicates:
                - Path=/orders/**
            - id: inventory-service
              uri: http://inventory-service:8080
              predicates:
                - Path=/inventory/**
server:
  port: 8080