services:

  product-service:
    build: .                          # build the image using your Dockerfile
    ports:
      - "8081:8080"                   # host:container (port mapping)
    environment:
      DB_URL: jdbc:mysql://product-db:3306/products
      DB_USER: root
      DB_PASSWORD: password
    depends_on:                       # don't start until the DB container is up
      product-db:
        condition: service_healthy

  product-db:
    image: mysql:9.6.0                    # the image you already pulled from Docker Hub
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: products
    volumes:
      - mysql-data:/var/lib/mysql     # persist data across restarts
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  mysql-data: